<div class="profil-container">

  <div class="profil-card">
    <div class="header">
      <h2>Hallo, {{ username }}!</h2>
      <p>Deine Aufgaben für diese Woche:</p>
    </div>

    <div class="dienste-liste">
      @for (dienst of meineDienste; track dienst.id) {
        <div class="dienst-item">
          <span class="datum">{{ dienst.datum | date: 'EEEE, dd.MM.' : '' : 'de' }}</span>
          <span class="bezeichnung">{{ dienst.dienstName }}</span>
        </div>
      } @empty {
        <p class="empty-msg">Du hast diese Woche keine festen Dienste. Genieße die Freizeit!</p>
      }
    </div>
  </div>

  <div class="profil-card pw-section">
    <h3>Sicherheit</h3>
    <form (ngSubmit)="onChangePassword()">
      <input type="text" name="username" autocomplete="username" [value]="username" style="display: none;">
      <div class="form-group">
        <label>Neues Passwort</label>
        <input type="password" name="newPw" [(ngModel)]="passwordData.newPassword" required autocomplete="new-password">
      </div>
      <div class="form-group">
        <label>Passwort bestätigen</label>
        <input type="password" name="confirmPw" [(ngModel)]="passwordData.confirmPassword" required autocomplete="new-password">
      </div>
      <button type="submit" class="btn-save">Passwort aktualisieren</button>
    </form>
  </div>

</div>
